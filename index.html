<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazbin Hotel Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>

  <!-- Side Menu -->
  <nav class="side-menu-drawer" id="sideMenu">
    <div class="drawer-header">
      <h2>Navigation</h2>
      <button class="close-btn" id="closeMenuBtn">&times;</button>
    </div>
    <ul class="drawer-links">
      <li><a href="home.html">🏠 Homepage</a></li>
      <li><a href="movies.html">📺 Live Streaming</a></li>
      <li><a href="#" class="active">📊 Content Matrix</a></li>
    </ul>
  </nav>
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="app-wrapper">
    <header class="app-header">
      <button class="menu-toggle-btn" id="openMenuBtn">☰ Menu</button>
      <div class="system-status">Matrix Active</div>
    </header>

    <div class="content-matrix-container">
      <main class="media-info-panel">
        <div class="poster-frame-wrapper">
          <img src="HHPostertallS2.jpg" alt="Poster" class="poster-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="image-fallback"><span>Poster Frame</span></div>
        </div>
        <div class="meta-content">
          <h1 id="showTitle">Hazbin Hotel</h1>
          <div class="badges-row" id="badges"></div>
          <p class="summary-text" id="desc"></p>
          <button class="launch-cta">▶ Launch Service</button>
        </div>
      </main>

      <aside class="episode-catalog-panel">
        <h2 class="catalog-heading">Episode Catalog</h2>
        <div class="tab-navigation" id="tabNav"></div>
        <div id="episodeViewContainer"></div>
      </aside>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
