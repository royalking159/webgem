<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazbin Hotel - Content Matrix</title>
  <link rel="stylesheet" href="styles.css?v=31">
</head>
<body class="stremio-body">

  <!-- SIDE NAVIGATION MENU DRAWER -->
  <nav class="side-menu-drawer" id="sideMenu">
    <div class="drawer-header">
      <h2>Navigation</h2>
      <button class="close-btn" id="closeMenuBtn">&times;</button>
    </div>
    <ul class="drawer-links">
      <li><a href="home.html">🏠 Homepage</a></li>
      <li><a href="movies.html">📺 Live Streaming</a></li>
      <li><a href="movie-detail.html" class="active">📊 Content Matrix</a></li>
    </ul>
  </nav>
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- STREMIO-INSPIRED FULL SCREEN CANVAS -->
  <div class="app-wrapper">
    
    <header class="app-header">
      <button class="menu-toggle-btn" id="openMenuBtn">☰ Menu</button>
      <div class="system-status">Matrix Engine Active</div>
    </header>

    <div class="stremio-container">
      
      <!-- LEFT DESIGN TRACK: FLUSH TYPOGRAPHY DESCRIPTION STACK -->
      <main class="stremio-left-panel">
        <div class="backdrop-banner-wrapper">
          <img src="HHPostertallS2.jpg" alt="Hazbin Hotel Poster" class="stremio-poster-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="image-fallback"><span>Poster Asset Node</span></div>
        </div>
        
        <div class="stremio-meta-block">
          <h1 class="stremio-title" id="showTitle">Hazbin Hotel</h1>
          
          <div class="badges-row" id="badgesRow">
            <!-- Loaded dynamically via JS -->
          </div>
          
          <p class="stremio-desc" id="summaryText">Querying matrix datastore indexes...</p>
          
          <button class="stremio-play-btn">
            <span class="play-icon-shape">▶</span> Watch Now
          </button>
        </div>
      </main>

      <!-- RIGHT DESIGN TRACK: FLOATING SIDE PANEL INDEPENDENT CATALOG BOX -->
      <aside class="stremio-right-panel">
        <h2 class="catalog-heading">Episodes</h2>
        
        <div class="tab-navigation" id="tabNav">
          <!-- Loaded dynamically via JS -->
        </div>

        <div class="episode-scroll-list" id="episodeContainer">
          <!-- Loaded dynamically via JS -->
        </div>
      </aside>

    </div>
  </div>

  <script src="app.js?v=31"></script>
</body>
</html>
