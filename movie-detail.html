<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazbin Hotel Matrix Dashboard</title>
  <link rel="stylesheet" href="styles.css?v=20">
</head>
<body>

  <!-- SIDE NAVIGATION MENU DRAWER -->
  <nav class="side-menu-drawer" id="sideMenu">
    <div class="drawer-header">
      <h2>Navigation</h2>
      <button class="close-btn" id="closeMenuBtn">&times;</button>
    </div>
    <ul class="drawer-links">
      <li><a href="home.html">🏠 Homepage</a></li>
      <li><a href="movies.html">📺 Live Streaming</a></li>
      <li><a href="movie-detail.html" class="active">📊 Content Matrix</a></li>
    </ul>
  </nav>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="app-wrapper">
    <!-- TOP NAVIGATION HEADBAR -->
    <header class="app-header">
      <button class="menu-toggle-btn" id="openMenuBtn">
        <span>☰</span> Menu
      </button>
      <div class="system-status">System Matrix Active</div>
    </header>

    <!-- MAIN TWO-COLUMN GRID VIEW CONTAINER -->
    <div class="content-matrix-container">
      
      <!-- LEFT PANEL: MEDIA INFORMATION -->
      <main class="media-info-panel">
        <div class="poster-frame-wrapper">
          <img src="HHPostertallS2.jpg" alt="Hazbin Hotel Content Matrix Poster Frame" class="poster-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="image-fallback">
            <span>Hazbin Hotel Content Matrix Poster Frame</span>
          </div>
        </div>
        
        <div class="meta-content">
          <h1 class="main-title" id="showTitle">Hazbin Hotel</h1>
          
          <div class="badges-row" id="badgesRow">
            <!-- Populated dynamically via JS -->
          </div>
          
          <p class="summary-text" id="summaryText">Loading...</p>
          
          <button class="launch-cta">
            <span class="play-icon">▶</span> Launch Streaming Service
          </button>
        </div>
      </main>

      <!-- RIGHT PANEL: CATALOG SYSTEM INDEX -->
      <aside class="episode-catalog-panel">
        <h2 class="catalog-heading">System Episode Catalog Index</h2>
        
        <div class="tab-navigation" id="tabNav">
          <!-- Populated dynamically via JS -->
        </div>

        <div id="episodeContainer">
          <!-- Populated dynamically via JS -->
        </div>
      </aside>
    </div>
  </div>

  <script src="app.js?v=20"></script>
</body>
</html>
