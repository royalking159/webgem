<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazbin Hotel - Content Matrix</title>
  <link rel="stylesheet" href="styles.css?v=55">
</head>
<body>

  <nav class="side-menu-drawer" id="sideMenu">
    <div class="drawer-header">
      <h2>Navigation</h2>
      <button class="close-btn" id="closeMenuBtn">&times;</button>
    </div>
    <ul class="drawer-links">
      <li><a href="home.html">🏠 Homepage</a></li>
      <li><a href="movies.html">📺 Live Streaming</a></li>
      <li><a href="movie-detail.html" class="active">📊 Content Matrix</a></li>
    </ul>
  </nav>
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <div class="app-wrapper">
    <header class="app-header">
      <button class="menu-toggle-btn" id="openMenuBtn">☰ Menu</button>
      <div class="system-status">Matrix Deck Rendering</div>
    </header>

    <div class="stremio-container">
      <!-- Left Dynamic Details Content Panel -->
      <main class="stremio-left-panel">
        <div class="poster-display-frame">
          <img src="HHPostertallS2.jpg" alt="Show Poster" id="posterImage">
        </div>
        <div class="stremio-meta-block">
          <h1 class="stremio-title" id="showTitle">Loading Matrix...</h1>
          <div class="badges-row" id="badgesRow"></div>
          <p class="stremio-desc" id="summaryText">Initializing local array matrices...</p>
          <button class="stremio-play-btn">▶ Watch Now</button>
        </div>
      </main>

      <!-- Right Interactive Dynamic List Selection Panel -->
      <aside class="stremio-right-panel">
        <h2 class="catalog-heading">Episodes</h2>
        <div class="tab-navigation" id="tabNav"></div>
        <div class="episode-scroll-list" id="episodeContainer"></div>
      </aside>
    </div>
  </div>

  <script src="app.js?v=55"></script>
</body>
</html>
