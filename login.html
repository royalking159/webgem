<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nicholas Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0b0914; overflow: hidden;">
    <div class="glass-panel" style="width: 360px; padding: 45px 35px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
        <h2 style="margin-bottom: 10px; font-size: 26px; font-weight: 800; letter-spacing: -0.5px;">Welcome Back</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">Enter your workspace portal</p>
        <form action="home.html" method="get" style="display: flex; flex-direction: column; gap: 16px;">
            <div style="position: relative; text-align: left;">
                <input type="text" placeholder="Username" required style="width: 100%; box-sizing: border-box; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(11,9,20,0.6); color: white; font-family: inherit; font-size: 14px; outline: none;">
            </div>
            <div style="position: relative; text-align: left;">
                <input type="password" placeholder="Password" required style="width: 100%; box-sizing: border-box; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(11,9,20,0.6); color: white; font-family: inherit; font-size: 14px; outline: none;">
            </div>
            <button type="submit" style="width: 100%; padding: 14px; border-radius: 10px; border: none; background: #8b5cf6; color: white; font-weight: 600; font-family: inherit; font-size: 15px; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 15px rgba(139,92,246,0.3); margin-top: 10px;">Sign In</button>
        </form>
    </div>
</body>
</html>
