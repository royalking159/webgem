<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nicholas Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="glass-panel" style="width: 350px; padding: 40px; text-align: center;">
        <h2 style="margin-bottom: 20px; color: white;">Welcome Back</h2>
        <form action="home.html" method="get" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="Username" style="padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: white;">
            <input type="password" placeholder="Password" style="padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a2e; color: white;">
            <button type="submit" style="padding: 12px; border-radius: 8px; border: none; background: #8b5cf6; color: white; font-weight: 600; cursor: pointer;">Login</button>
        </form>
    </div>
</body>
</html>
