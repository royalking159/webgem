<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nicholas Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0b0914; overflow: hidden;">
    <div class="glass-panel" style="width: 380px; padding: 50px 40px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.06);">
        <div style="font-size: 32px; font-weight: 900; letter-spacing: -1px; color: #fff; margin-bottom: 5px; font-family: 'Inter', sans-serif;">nicholas<span style="color: #8b5cf6;">.</span></div>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 35px; font-weight: 500;">Secure Portal Authorization Workspace</p>
        <form action="home.html" method="get" style="display: flex; flex-direction: column; gap: 18px;">
            <div style="position: relative;">
                <input type="text" placeholder="Access Username" required style="width: 100%; box-sizing: border-box; padding: 15px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); background: rgba(11,9,20,0.7); color: white; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;">
            </div>
            <div style="position: relative;">
                <input type="password" placeholder="Gateway Password" required style="width: 100%; box-sizing: border-box; padding: 15px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); background: rgba(11,9,20,0.7); color: white; font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;">
            </div>
            <button type="submit" style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: #8b5cf6; color: white; font-weight: 700; font-family: inherit; font-size: 15px; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 20px rgba(139,92,246,0.35); margin-top: 10px;">Authorize Session</button>
        </form>
    </div>
</body>
</html>
